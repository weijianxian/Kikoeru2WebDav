name = "kikoeru2webdav"
main = "src/index.js"
compatibility_date = "2026-06-05"

[vars]
# Pass the work id in the URL path, for example:
# https://your-worker.example/01489611/
ASMR_URL_FIELD = "mediaDownloadUrl"
ASMR_CACHE_TTL_SECONDS = "300"
DAV_TITLE = "asmr-webdav"

# Popular works are available at /popular/. Query params can override
# page/pageSize, for example /popular/?page=2&pageSize=20.
ASMR_POPULAR_PAGE = "1"
ASMR_POPULAR_PAGE_SIZE = "20"
ASMR_POPULAR_KEYWORD = " "

# Optional manual entries can still be added. Relative paths require
# REMOTE_BASE_URL; full URLs work without it.
